# Apple product seed — ASINs of current Apple gear on Amazon US.
#
# Each entry has:
#   asin:       Amazon US ASIN
#   apple_sku:  model identifier (best effort — newer M5 ASINs have no public Apple SKU yet)
#   category:   MacBook / iPad / iPhone / AirPods / Watch
#   name:       short label
#   new_msrp:   post-2026-06-25 Apple US MSRP (USD) — baseline for deal detection
#   notes:      context about pricing history
#
# The `new_msrp` is the BASELINE we compare against.
# Any current_price < new_msrp * 0.98 is flagged as a "still old price" deal.
#
# IMPORTANT — verified 2026-07-10 by browsing Amazon.com:
# Every ASIN below was confirmed live by visiting amazon.com/dp/<asin> and
# reading the product page title. Apple is on M5 generation now (iPhone 17,
# MacBook Neo, MacBook Air M5). Most M3/M4 listings on Amazon are Renewed
# only. The seed includes both:
#   - Current-gen listings (M5) — these are the priority for the price
#     tracker because the price-hike story is freshest here
#   - A few M3/M4 listings (Renewed) — kept as historical reference points
#
# To regenerate ASINs: search amazon.com for the product, take the top
# Apple-store or major-reseller ASIN.
#
# US MSRP adjustments (post-2026-06-25 per Reuters memory-cost story):
#   MacBook Air M5:  +$100 across the line (proportionally more for higher RAM)
#   MacBook Pro M5:  +$200-400 depending on config
#   MacBook Neo:     +$50-100
#   iPad Pro M4/M5:  +$100
