# Apple product seed — ASINs of current Apple gear on Amazon US.
#
# Each entry has:
#   asin:       Amazon US ASIN
#   apple_sku:  model identifier (best effort)
#   category:   MacBook / iPad / iPhone / AirPods / Watch
#   name:       short label
#   new_msrp:   post-2026-06-25 Apple US MSRP (USD) — baseline for deal detection
#   notes:      context about pricing history
#
# The `new_msrp` is the BASELINE we compare against.
# Any current_price < new_msrp * 0.98 is flagged as a "still old price" deal.
#
# To regenerate ASINs: search amazon.com for the product, take the top
# Apple-store ASIN. For iPhones/Macs that are sold direct only, use the
# "Apple" brand filter in the search sidebar.
#
# US MSRP adjustments (post-2026-06-25 per Reuters memory-cost story):
#   MacBook Air: +$100 across the line
#   MacBook Pro: +$200-400 depending on config
#   iPad Pro:    +$100
#   iPad Air 13": held at $799
#   iPhone 16:   +$100
#   AirPods:     +$20-50
#   Apple Watch: small bumps
